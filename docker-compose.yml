# Pulls the official Qdrant image
services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: docquery_qdrant
    ports:
      - "6333:6333" # where the app talks to Qdrant
      - "6334:6334" # Qdrant's web dashboard to visually inspect what's stored
    volumes:
      - qdrant_storage:/qdrant/storage # persists data even if the container restarts
    restart: unless-stopped # auto-restarts if it crashes, like a real production service

volumes:
  qdrant_storage: